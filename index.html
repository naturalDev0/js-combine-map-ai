<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

    <!-- Marker cluster CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div id="map-container">
        <!-- search button -->
        <div id="search-container">
            <div class="tabs">
                <button class="tab-btn active" data-tab="search">Search</button>
                <button class="tab-btn" data-tab="recommend">AI Recommend</button>
            </div>

            <div id="search-tab" class="tab-content active">
                <input type="text" id="search-terms" />
                <button id="search-btn">Search</button>
                <div id="search-results"></div>
            </div>

            <div id="recommend-tab" class="tab-content">
                <input type="text" id="recommend-terms" />
                <button id="recommend-btn">Get Recommendations</button>
                <div id="recommend-loading" class="loading"></div>
                <div id="recommend-error" class="error"></div>
                <div id="recommend-results"></div>
            </div>
        </div>

        <div id="singapore-map"></div>
    </div>

    <!-- Make sure you put this AFTER Leaflet's CSS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <!-- axios -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.7.7/axios.min.js"
        integrity="sha512-DdX/YwF5e41Ok+AI81HI8f5/5UsoxCVT9GKYZRIzpLxb8Twz4ZwPPX+jQMwMhNQ9b5+zDEefc+dcvQoPWGNZ3g=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <script src="data.js"></script>
    <script src="map.js"></script>
    <script src="script.js"></script>
</body>

</html>
